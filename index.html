<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3CA.UBI - Knowledge Base</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            color: #333;
        }

        .container {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            max-width: 700px;
            width: 90%;
        }

        h1 {
            margin-bottom: 1rem;
            font-weight: 600;
        }

        p {
            margin-bottom: 2rem;
            color: #666;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            padding: 32px 32px;
            font-size: 1rem;
            font-weight: bold;
            text-decoration: none;
            color: #fff;
            background-color: #0c2340;
            border-radius: 8px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            box-shadow: 0 4px 6px rgba(0, 123, 255, 0.2);
        }

        .btn:hover {
            background-color: #153d6d;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to 3CA.UBI - Knowledge Base</h1>
        <p>Available resources:</p>
        <a href="https://3caubi.github.io/deucalion" class="btn">Deucalion User Guide</a>
    </div>

</body>
</html>
